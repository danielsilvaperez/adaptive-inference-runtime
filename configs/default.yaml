# Adaptive Inference Runtime - Default Configuration
# This file contains the default configuration settings for AIR.

# Runtime settings
runtime:
  # Device to use for inference (cuda, cpu, mps)
  device: auto
  # Number of worker threads
  num_workers: 4
  # Enable mixed precision inference
  mixed_precision: true
  # Maximum batch size
  max_batch_size: 32

# Model routing configuration
routing:
  # Enable dynamic model routing
  enabled: true
  # Confidence threshold for routing decisions
  confidence_threshold: 0.85
  # Complexity threshold for escalation
  complexity_threshold: 0.7
  # Small model identifier
  small_model: null
  # Large model identifier
  large_model: null

# Speculative decoding configuration
speculation:
  # Enable speculative decoding
  enabled: true
  # Number of tokens to speculate
  speculation_length: 5
  # Draft model identifier
  draft_model: null
  # Acceptance threshold
  acceptance_threshold: 0.9

# KV cache compression configuration
compression:
  # Enable KV cache compression
  enabled: true
  # Compression method (attention_pooling, quantization, hybrid)
  method: attention_pooling
  # Compression ratio target
  target_ratio: 0.5
  # Minimum quality threshold
  quality_threshold: 0.95

# Generation settings
generation:
  # Maximum number of tokens to generate
  max_tokens: 512
  # Temperature for sampling
  temperature: 0.7
  # Top-p (nucleus) sampling parameter
  top_p: 0.9
  # Top-k sampling parameter
  top_k: 50
  # Repetition penalty
  repetition_penalty: 1.1
  # Stop sequences
  stop_sequences: []

# Logging configuration
logging:
  # Log level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
  level: INFO
  # Enable colored console output
  colored: true
  # Log file path (null to disable file logging)
  file: null
  # Log format
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
